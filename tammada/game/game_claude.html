<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SENTINEL — Tower Defense</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #030711;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 14px;
  user-select: none;
  color: #c0d8f0;
}
h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 26px;
  color: #00d4ff;
  letter-spacing: 10px;
  text-shadow: 0 0 20px #00d4ff90, 0 0 50px #00d4ff30;
  margin-bottom: 10px;
}
#game-container {
  border: 1px solid #1a3a5c;
  box-shadow: 0 0 40px #00d4ff0a, 0 0 1px #00d4ff40;
  position: relative;
}
canvas { display: block; cursor: crosshair; }
#ui-panel {
  background: #04090f;
  border: 1px solid #1a3a5c;
  border-top: none;
  width: 840px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tower-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 7px 10px;
  border: 1px solid #1a3a5c;
  background: #080f1c;
  color: #7a9ab8;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 72px;
  gap: 3px;
  font-family: 'Share Tech Mono', monospace;
}
.tower-btn:hover { border-color: #00d4ff; color: #00d4ff; box-shadow: 0 0 8px #00d4ff25; }
.tower-btn.active { border-color: #00d4ff; background: #0b2040; color: #00d4ff; box-shadow: 0 0 14px #00d4ff35; }
.tower-btn .ticon { width: 30px; height: 30px; }
.tower-btn .tname { font-size: 10px; letter-spacing: 1.5px; }
.tower-btn .tcost { font-size: 10px; color: #f0c060; }
.divider { width: 1px; height: 50px; background: #1a3a5c; margin: 0 4px; }
.action-btn {
  padding: 9px 16px;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  transition: all 0.2s;
  text-transform: uppercase;
}
#wave-btn { border-color: #00d4ff; color: #00d4ff; }
#wave-btn:hover { background: #00d4ff15; box-shadow: 0 0 14px #00d4ff30; }
#wave-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#sell-btn { border-color: #ff5060; color: #ff5060; }
#sell-btn:hover { background: #ff506015; box-shadow: 0 0 14px #ff506030; }
#spd-btn { border-color: #80c0ff; color: #80c0ff; }
#spd-btn:hover { background: #80c0ff15; }
.stats { display: flex; gap: 20px; margin-left: auto; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-label { font-size: 9px; color: #3a6080; letter-spacing: 2px; text-transform: uppercase; }
.stat-value { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #00d4ff; }
.stat-value.gold { color: #f0c060; }
.stat-value.lives { color: #ff5570; }
.hints {
  width: 840px;
  padding: 5px 14px;
  font-size: 10px;
  color: #2a4a6a;
  letter-spacing: 1px;
  display: flex;
  gap: 20px;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #00000090;
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
#overlay.show { display: flex; }
#overlay h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  font-weight: 900;
  text-shadow: 0 0 30px currentColor;
}
#overlay p { font-size: 16px; color: #8ab0d0; letter-spacing: 2px; }
#overlay button {
  padding: 12px 32px;
  border: 1px solid #00d4ff;
  background: #0a2040;
  color: #00d4ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
#overlay button:hover { background: #0d3060; box-shadow: 0 0 20px #00d4ff50; }
</style>
</head>
<body>

<h1>◈ SENTINEL ◈</h1>

<div id="game-container">
  <canvas id="canvas" width="840" height="560"></canvas>
</div>

<div id="ui-panel">
  <button class="tower-btn" data-type="cannon">
    <canvas class="ticon" id="icon-cannon"></canvas>
    <span class="tname">CANNON</span>
    <span class="tcost">⬡ 50</span>
  </button>
  <button class="tower-btn" data-type="laser">
    <canvas class="ticon" id="icon-laser"></canvas>
    <span class="tname">LASER</span>
    <span class="tcost">⬡ 100</span>
  </button>
  <button class="tower-btn" data-type="freeze">
    <canvas class="ticon" id="icon-freeze"></canvas>
    <span class="tname">FREEZE</span>
    <span class="tcost">⬡ 75</span>
  </button>
  <button class="tower-btn" data-type="missile">
    <canvas class="ticon" id="icon-missile"></canvas>
    <span class="tname">MISSILE</span>
    <span class="tcost">⬡ 125</span>
  </button>
  <div class="divider"></div>
  <button class="action-btn" id="wave-btn">▶ SEND WAVE</button>
  <button class="action-btn" id="sell-btn">✕ SELL</button>
  <button class="action-btn" id="spd-btn">⏩ 1×</button>
  <div class="stats">
    <div class="stat">
      <span class="stat-label">Gold</span>
      <span class="stat-value gold" id="s-gold">150</span>
    </div>
    <div class="stat">
      <span class="stat-label">Lives</span>
      <span class="stat-value lives" id="s-lives">20</span>
    </div>
    <div class="stat">
      <span class="stat-label">Wave</span>
      <span class="stat-value" id="s-wave">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="s-score">0</span>
    </div>
  </div>
</div>

<div class="hints">
  <span>[1-4] Select tower</span>
  <span>[Space] Send wave</span>
  <span>[S] Sell tower</span>
  <span>[Esc] Deselect</span>
  <span>Click tower to inspect</span>
</div>

<div id="overlay">
  <h2 id="ol-title">GAME OVER</h2>
  <p id="ol-sub">YOUR BASE HAS FALLEN</p>
  <button onclick="restartGame()">↺ RESTART</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const COLS = 21, ROWS = 14, CELL = 40;
const CW = COLS * CELL, CH = ROWS * CELL; // 840 × 560

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Path waypoints [col, row] — winding route across the map
const WPS = [
  [-1,2],[4,2],[4,6],[11,6],[11,2],[16,2],[16,10],[6,10],[6,13],[21,13]
];
// Pixel centers of waypoints
const PWP = WPS.map(([c,r]) => ({ x: c*CELL + CELL/2, y: r*CELL + CELL/2 }));

// Precompute path cell set
function buildPathCells() {
  const s = new Set();
  for (let i = 0; i < WPS.length - 1; i++) {
    const [x1,y1] = WPS[i], [x2,y2] = WPS[i+1];
    if (x1 === x2) {
      const lo = Math.min(y1,y2), hi = Math.max(y1,y2);
      for (let y = lo; y <= hi; y++) {
        if (x1 >= 0 && x1 < COLS && y >= 0 && y < ROWS) s.add(`${x1},${y}`);
      }
    } else {
      const lo = Math.min(x1,x2), hi = Math.max(x1,x2);
      for (let x = lo; x <= hi; x++) {
        if (x >= 0 && x < COLS && y1 >= 0 && y1 < ROWS) s.add(`${x},${y1}`);
      }
    }
  }
  return s;
}
const PATH_CELLS = buildPathCells();
const isPath = (c,r) => PATH_CELLS.has(`${c},${r}`);

// ═══════════════════════════════════════════════
//  TOWER & ENEMY CONFIGS
// ═══════════════════════════════════════════════
const TOWERS = {
  cannon:  { name:'CANNON',  cost:50,  dmg:28,  range:3.5, rate:1.2, spd:220, pSize:5, color:'#4a9eff', tip:'Balanced — good all-rounder' },
  laser:   { name:'LASER',   cost:100, dmg:65,  range:5.0, rate:0.5, spd:500, pSize:3, color:'#ff4aaa', tip:'High damage, long range' },
  freeze:  { name:'FREEZE',  cost:75,  dmg:8,   range:3.0, rate:2.0, spd:190, pSize:6, color:'#40e0ff', slow:true, tip:'Slows enemies by 55%' },
  missile: { name:'MISSILE', cost:125, dmg:55,  range:4.0, rate:0.6, spd:160, pSize:7, color:'#ff9030', splash:65, tip:'Splash — hits multiple enemies' },
};
const ENEMIES = {
  grunt:   { name:'GRUNT',   hp:90,   spd:68,  reward:10,  color:'#ff4060', sz:9,  shape:'circle' },
  speeder: { name:'SPEEDER', hp:45,   spd:145, reward:15,  color:'#ffaa20', sz:7,  shape:'diamond' },
  tank:    { name:'TANK',    hp:450,  spd:32,  reward:35,  color:'#aa40ff', sz:13, shape:'square' },
  boss:    { name:'BOSS',    hp:1400, spd:26,  reward:130, color:'#ff2020', sz:17, shape:'hex' },
};

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let gold, lives, wave, score;
let enemies, towers, projectiles, particles;
let selType = null, selTower = null;
let hovCell = null;
let waveActive = false, spawnQueue = [], spawnTimer = 0;
let gameOver = false, gameWon = false;
let speed = 1; // 1 or 2

function initGame() {
  gold = 150; lives = 20; wave = 0; score = 0;
  enemies = []; towers = []; projectiles = []; particles = [];
  selType = null; selTower = null; hovCell = null;
  waveActive = false; spawnQueue = []; spawnTimer = 0;
  gameOver = false; gameWon = false; speed = 1;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('wave-btn').disabled = false;
  document.getElementById('spd-btn').textContent = '⏩ 1×';
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}

function updateUI() {
  document.getElementById('s-gold').textContent = gold;
  document.getElementById('s-lives').textContent = lives;
  document.getElementById('s-wave').textContent = wave;
  document.getElementById('s-score').textContent = score;
}

// ═══════════════════════════════════════════════
//  WAVE GENERATION
// ═══════════════════════════════════════════════
const SPAWN_INTERVAL = 0.75;

function buildWave(n) {
  const count = 8 + n * 3;
  const hpM = 1 + (n - 1) * 0.22;
  const q = [];
  for (let i = 0; i < count; i++) {
    let type;
    if (n % 5 === 0 && i === count - 1)        type = 'boss';
    else if (n >= 4 && Math.random() < 0.22)   type = 'tank';
    else if (n >= 2 && Math.random() < 0.35)   type = 'speeder';
    else                                         type = 'grunt';
    q.push({ type, hpM });
  }
  return q;
}

function startWave() {
  if (waveActive || gameOver) return;
  wave++;
  spawnQueue = buildWave(wave);
  spawnTimer = 0;
  waveActive = true;
  document.getElementById('wave-btn').disabled = true;
  updateUI();
}

// ═══════════════════════════════════════════════
//  ENEMY CLASS
// ═══════════════════════════════════════════════
class Enemy {
  constructor(type, hpM) {
    const c = ENEMIES[type];
    this.type = type; this.cfg = c;
    this.x = PWP[0].x; this.y = PWP[0].y;
    this.maxHp = c.hp * hpM;
    this.hp = this.maxHp;
    this.baseSpd = c.spd; this.spd = c.spd;
    this.reward = c.reward;
    this.wpIdx = 1;
    this.dist = 0; // total distance traveled (used for targeting priority)
    this.slowTimer = 0;
    this.dead = false; this.reached = false;
  }
  update(dt) {
    if (this.slowTimer > 0) { this.slowTimer -= dt; this.spd = this.baseSpd * 0.45; }
    else this.spd = this.baseSpd;
    if (this.wpIdx >= PWP.length) { this.reached = true; return; }
    const t = PWP[this.wpIdx];
    const dx = t.x - this.x, dy = t.y - this.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const move = this.spd * dt;
    if (d <= move) {
      this.x = t.x; this.y = t.y;
      this.dist += d;
      this.wpIdx++;
    } else {
      this.x += dx/d * move;
      this.y += dy/d * move;
      this.dist += move;
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    const s = this.cfg.sz;
    ctx.shadowColor = this.cfg.color;
    ctx.shadowBlur = 14;
    ctx.fillStyle = this.cfg.color;

    if (this.cfg.shape === 'circle') {
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.fill();
    } else if (this.cfg.shape === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s*.7,0); ctx.lineTo(0,s); ctx.lineTo(-s*.7,0);
      ctx.closePath(); ctx.fill();
    } else if (this.cfg.shape === 'square') {
      ctx.fillRect(-s,-s,s*2,s*2);
    } else if (this.cfg.shape === 'hex') {
      ctx.beginPath();
      for (let i=0;i<6;i++) {
        const a = i*Math.PI/3 - Math.PI/6;
        i===0 ? ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s) : ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);
      }
      ctx.closePath(); ctx.fill();
    }

    // HP bar
    ctx.shadowBlur = 0;
    const bw = s*2+6, bh = 3, by = -s-7;
    ctx.fillStyle = '#200';
    ctx.fillRect(-bw/2, by, bw, bh);
    const pct = this.hp/this.maxHp;
    ctx.fillStyle = pct > .5 ? '#0f0' : pct > .25 ? '#ff0' : '#f40';
    ctx.fillRect(-bw/2, by, bw*pct, bh);

    // Slow indicator
    if (this.slowTimer > 0) {
      ctx.strokeStyle = '#40e0ff';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#40e0ff';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0,0,s+3,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
//  TOWER CLASS
// ═══════════════════════════════════════════════
class Tower {
  constructor(col, row, type) {
    this.col = col; this.row = row;
    this.x = col*CELL+CELL/2; this.y = row*CELL+CELL/2;
    this.type = type; this.cfg = TOWERS[type];
    this.range = this.cfg.range * CELL;
    this.cooldown = 0;
    this.angle = Math.PI/2; // face right initially
    this.target = null;
    this.sellVal = Math.floor(this.cfg.cost * 0.6);
  }
  update(dt) {
    this.cooldown = Math.max(0, this.cooldown - dt);
    // Find best target (furthest along path in range)
    this.target = null;
    let bestDist = -1;
    for (const e of enemies) {
      if (e.dead || e.reached) continue;
      const dx = e.x-this.x, dy = e.y-this.y;
      if (Math.sqrt(dx*dx+dy*dy) <= this.range && e.dist > bestDist) {
        bestDist = e.dist; this.target = e;
      }
    }
    if (this.target) {
      this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
      if (this.cooldown <= 0) {
        this.cooldown = 1 / this.cfg.rate;
        projectiles.push(new Projectile(this));
      }
    }
  }
  draw(selected) {
    ctx.save();
    ctx.translate(this.x, this.y);
    const col = this.cfg.color;
    ctx.shadowColor = col;
    ctx.shadowBlur = selected ? 22 : 12;

    // Base ring
    ctx.beginPath(); ctx.arc(0,0,CELL*.42,0,Math.PI*2);
    ctx.fillStyle = '#070f1e';
    ctx.strokeStyle = col; ctx.lineWidth = selected ? 2 : 1.5;
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = col;

    if (this.type === 'freeze') {
      // Snowflake arms
      for (let i=0;i<6;i++) {
        ctx.save(); ctx.rotate(i*Math.PI/3);
        ctx.fillRect(-1.5, -CELL*.37, 3, CELL*.37);
        ctx.fillRect(-1.5+6, -CELL*.2, 3, CELL*.12);
        ctx.fillRect(-1.5-6, -CELL*.2, 3, CELL*.12);
        ctx.restore();
      }
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    } else {
      // Barrel — rotates toward target
      ctx.save(); ctx.rotate(this.angle);
      if (this.type === 'cannon') {
        ctx.fillRect(3,-3.5,CELL*.33,7);
        ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
      } else if (this.type === 'laser') {
        ctx.fillRect(3,-2,CELL*.38,4);
        ctx.fillRect(3,-5.5,CELL*.2,2);
        ctx.fillRect(3,3.5,CELL*.2,2);
        ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      } else if (this.type === 'missile') {
        ctx.fillRect(3,-3,CELL*.26,6);
        ctx.beginPath();
        ctx.moveTo(CELL*.26+3,0); ctx.lineTo(CELL*.4,-4.5); ctx.lineTo(CELL*.4,4.5);
        ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // Dashed orbit ring
    ctx.shadowBlur = 0;
    ctx.strokeStyle = col+'28'; ctx.lineWidth = 1;
    ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.arc(0,0,CELL*.44,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  drawRange() {
    ctx.save();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.range,0,Math.PI*2);
    ctx.fillStyle = this.cfg.color+'0e';
    ctx.strokeStyle = this.cfg.color+'50';
    ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
//  PROJECTILE CLASS
// ═══════════════════════════════════════════════
class Projectile {
  constructor(tower) {
    this.x = tower.x; this.y = tower.y;
    this.target = tower.target;
    this.cfg = tower.cfg;
    this.type = tower.type;
    this.done = false;
  }
  update(dt) {
    if (!this.target || this.target.dead || this.target.reached) { this.done = true; return; }
    const dx = this.target.x-this.x, dy = this.target.y-this.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d < 10) { this.hit(); return; }
    const mv = this.cfg.spd * dt;
    this.x += dx/d*mv; this.y += dy/d*mv;
  }
  hit() {
    this.done = true;
    spawnHitParticles(this.x, this.y, this.cfg.color, 6);
    if (this.cfg.splash) {
      for (const e of enemies) {
        if (e.dead || e.reached) continue;
        const dx=e.x-this.x, dy=e.y-this.y;
        if (Math.sqrt(dx*dx+dy*dy) <= this.cfg.splash) dealDmg(e, this.cfg.dmg);
      }
      particles.push({ type:'splash', x:this.x, y:this.y, color:this.cfg.color, r:0, maxR:this.cfg.splash, life:0.4, maxLife:0.4 });
    } else {
      dealDmg(this.target, this.cfg.dmg);
      if (this.cfg.slow && !this.target.dead) this.target.slowTimer = 1.6;
    }
  }
  draw() {
    ctx.save();
    ctx.shadowColor = this.cfg.color; ctx.shadowBlur = 10;
    ctx.fillStyle = this.cfg.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.cfg.pSize,0,Math.PI*2); ctx.fill();
    // Trail glow
    ctx.globalAlpha = 0.3; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.cfg.pSize*1.8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
//  PARTICLES (pooled as plain objects)
// ═══════════════════════════════════════════════
function spawnHitParticles(x, y, color, n) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const v = 40 + Math.random()*80;
    particles.push({ type:'dot', x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v,
      color, sz: 1.5+Math.random()*2.5, life:0.4+Math.random()*0.3, maxLife:1 });
  }
}

function updateParticle(p, dt) {
  p.life -= dt;
  if (p.type === 'dot') { p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.88; p.vy *= 0.88; }
  else if (p.type === 'splash') { p.r = p.maxR * (1 - p.life/p.maxLife); }
  else if (p.type === 'text') { p.y -= 28*dt; }
  return p.life > 0;
}

function drawParticle(p) {
  const a = Math.max(0, p.life / (p.maxLife||0.5));
  ctx.save(); ctx.globalAlpha = a;
  if (p.type === 'dot') {
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  } else if (p.type === 'splash') {
    ctx.strokeStyle = p.color; ctx.lineWidth = 2;
    ctx.shadowColor = p.color; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
  } else if (p.type === 'text') {
    ctx.font = 'bold 13px Share Tech Mono';
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  GAME HELPERS
// ═══════════════════════════════════════════════
function dealDmg(e, dmg) {
  if (e.dead) return;
  e.hp -= dmg;
  if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead = true;
  gold += e.reward; score += e.reward * 10;
  spawnHitParticles(e.x, e.y, e.cfg.color, 12);
  particles.push({ type:'text', x:e.x-12, y:e.y-14, text:`+${e.reward}`, color:'#f0c060', life:0.9, maxLife:0.9 });
  updateUI();
}

function getTowerAt(c, r) { return towers.find(t => t.col===c && t.row===r) || null; }
function canBuild(c, r) { return !isPath(c,r) && !getTowerAt(c,r) && c>=0 && c<COLS && r>=0 && r<ROWS; }

function placeTower(c, r) {
  if (!selType) return;
  const cfg = TOWERS[selType];
  if (gold < cfg.cost) { flashMsg('NOT ENOUGH GOLD', '#f0c060'); return; }
  if (!canBuild(c, r)) return;
  gold -= cfg.cost;
  towers.push(new Tower(c, r, selType));
  updateUI();
}

function sellTower(t) {
  if (!t) return;
  const idx = towers.indexOf(t);
  if (idx < 0) return;
  gold += t.sellVal;
  towers.splice(idx, 1);
  selTower = null;
  particles.push({ type:'text', x:t.x-18, y:t.y-14, text:`+${t.sellVal}`, color:'#f0c060', life:0.9, maxLife:0.9 });
  updateUI();
}

let flashParticle = null;
function flashMsg(msg, color) {
  particles.push({ type:'text', x:CW/2 - msg.length*4, y:CH/2, text:msg, color, life:1.2, maxLife:1.2 });
}

// ═══════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════
function drawGrid() {
  ctx.fillStyle = '#050b14'; ctx.fillRect(0,0,CW,CH);
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const x=c*CELL, y=r*CELL;
      if (isPath(c,r)) {
        ctx.fillStyle = '#0c1d30'; ctx.fillRect(x,y,CELL,CELL);
        // Subtle center stripe
        ctx.fillStyle = '#0e2236';
        ctx.fillRect(x+2, y+CELL*.35, CELL-4, CELL*.3);
      } else {
        ctx.fillStyle = '#060e18'; ctx.fillRect(x,y,CELL,CELL);
        // Dot at cell center
        ctx.fillStyle = '#0d1e2c';
        ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,1,0,Math.PI*2); ctx.fill();
      }
      ctx.strokeStyle = '#0c1928'; ctx.lineWidth = 0.5;
      ctx.strokeRect(x,y,CELL,CELL);
    }
  }
}

function drawHover() {
  if (!hovCell) return;
  const {c,r} = hovCell;
  if (isPath(c,r)) return;
  const ok = canBuild(c,r) && selType && gold >= TOWERS[selType]?.cost;
  ctx.fillStyle = ok ? '#00d4ff12' : '#ff204012';
  ctx.strokeStyle = ok ? '#00d4ff70' : '#ff206070';
  ctx.lineWidth = 1.5;
  ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
  ctx.strokeRect(c*CELL, r*CELL, CELL, CELL);

  // Preview range
  if (selType && ok) {
    const cfg = TOWERS[selType];
    ctx.save();
    ctx.beginPath(); ctx.arc(c*CELL+CELL/2, r*CELL+CELL/2, cfg.range*CELL, 0,Math.PI*2);
    ctx.fillStyle = cfg.color+'08'; ctx.strokeStyle = cfg.color+'40'; ctx.lineWidth=1;
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

function drawEntryExit() {
  ctx.save();
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#00ff90'; ctx.shadowColor = '#00ff90';
  ctx.fillText('▶ IN', 2, WPS[0][1]*CELL + CELL/2 + 4);
  ctx.fillStyle = '#ff4060'; ctx.shadowColor = '#ff4060';
  ctx.fillText('BASE◀', CW-48, WPS[WPS.length-1][1]*CELL + CELL/2 + 4);
  ctx.restore();
}

function drawInfoBox() {
  if (!selTower && !selType) return;
  const bx = 10, by = 10, bw = 200, bh = selTower ? 95 : 85;
  ctx.save();
  ctx.fillStyle = '#030a15e0';
  ctx.strokeStyle = '#1a3a5c';
  ctx.lineWidth = 1;
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeRect(bx,by,bw,bh);

  ctx.font = '11px Share Tech Mono';
  let y = by+18;

  if (selTower) {
    const t = selTower;
    ctx.fillStyle = t.cfg.color; ctx.shadowColor = t.cfg.color; ctx.shadowBlur = 8;
    ctx.fillText(`◈ ${t.cfg.name}`, bx+10, y); y+=18;
    ctx.shadowBlur = 0; ctx.fillStyle = '#7a9ab8';
    ctx.fillText(`DMG:   ${t.cfg.dmg}`, bx+10, y); y+=14;
    ctx.fillText(`RANGE: ${t.cfg.range}`, bx+10, y); y+=14;
    ctx.fillText(`RATE:  ${t.cfg.rate}/s`, bx+10, y); y+=14;
    if (t.cfg.slow)   { ctx.fillStyle = '#40e0ff'; ctx.fillText('EFFECT: SLOW', bx+10, y); y+=14; ctx.fillStyle = '#7a9ab8'; }
    if (t.cfg.splash) { ctx.fillStyle = '#ff9030'; ctx.fillText(`SPLASH R: ${t.cfg.splash}px`, bx+10, y); y+=14; ctx.fillStyle = '#7a9ab8'; }
    ctx.fillStyle = '#f0c060';
    ctx.fillText(`SELL: ${t.sellVal}g  [S]`, bx+10, y);
  } else {
    const cfg = TOWERS[selType];
    ctx.fillStyle = cfg.color; ctx.shadowColor = cfg.color; ctx.shadowBlur = 8;
    ctx.fillText(`◈ ${cfg.name}  ${cfg.cost}g`, bx+10, y); y+=18;
    ctx.shadowBlur = 0; ctx.fillStyle = '#7a9ab8';
    ctx.fillText(`DMG:   ${cfg.dmg}`, bx+10, y); y+=14;
    ctx.fillText(`RANGE: ${cfg.range}`, bx+10, y); y+=14;
    ctx.fillText(`RATE:  ${cfg.rate}/s`, bx+10, y); y+=14;
    ctx.fillStyle = '#4a6a8a';
    const tip = cfg.tip;
    ctx.fillText(tip, bx+10, y);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
let lastT = 0;

function loop(ts) {
  const rawDt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  const dt = rawDt * speed;

  if (!gameOver) {
    // Spawn enemies
    if (waveActive && spawnQueue.length > 0) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        const n = spawnQueue.shift();
        enemies.push(new Enemy(n.type, n.hpM));
        spawnTimer = SPAWN_INTERVAL;
      }
    }

    // Update enemies
    for (const e of enemies) if (!e.dead && !e.reached) e.update(dt);

    // Check reach
    for (const e of enemies) {
      if (e.reached && !e.dead) {
        e.dead = true; lives--;
        updateUI();
        if (lives <= 0) { gameOver = true; endGame(false); }
      }
    }
    enemies = enemies.filter(e => !e.dead && !e.reached);

    // Wave complete?
    if (waveActive && spawnQueue.length === 0 && enemies.length === 0) {
      waveActive = false;
      document.getElementById('wave-btn').disabled = false;
      const bonus = 20 + wave * 5;
      gold += bonus;
      particles.push({ type:'text', x:CW/2-60, y:CH/2-20,
        text:`WAVE ${wave} COMPLETE  +${bonus}g`, color:'#00d4ff', life:2, maxLife:2 });
      updateUI();
    }

    // Update towers
    for (const t of towers) t.update(dt);

    // Update projectiles
    for (const p of projectiles) if (!p.done) p.update(dt);
    projectiles = projectiles.filter(p => !p.done);

    // Update particles
    particles = particles.filter(p => updateParticle(p, dt));
  }

  // ── RENDER ──
  drawGrid();
  drawHover();

  // Range rings
  if (selTower) selTower.drawRange();

  // Towers
  for (const t of towers) t.draw(t === selTower);

  // Projectiles
  for (const p of projectiles) p.draw();

  // Enemies
  for (const e of enemies) e.draw();

  // Particles
  for (const p of particles) drawParticle(p);

  drawEntryExit();
  drawInfoBox();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
//  GAME OVER / WIN
// ═══════════════════════════════════════════════
function endGame(won) {
  const ol = document.getElementById('overlay');
  document.getElementById('ol-title').textContent = won ? 'VICTORY' : 'SYSTEM FAILURE';
  document.getElementById('ol-title').style.color = won ? '#00d4ff' : '#ff4060';
  document.getElementById('ol-sub').textContent = `WAVE ${wave}  |  SCORE: ${score}`;
  ol.classList.add('show');
}

function restartGame() { initGame(); }

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - r.left) / CELL);
  const row = Math.floor((e.clientY - r.top) / CELL);
  hovCell = (c>=0&&c<COLS&&row>=0&&row<ROWS) ? {c,r:row} : null;
});
canvas.addEventListener('mouseleave', () => { hovCell = null; });

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const r = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - r.left) / CELL);
  const row = Math.floor((e.clientY - r.top) / CELL);
  if (c<0||c>=COLS||row<0||row>=ROWS) return;
  const existing = getTowerAt(c, row);
  if (existing) {
    selTower = existing; selType = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('active'));
  } else if (selType) {
    placeTower(c, row);
  } else {
    selTower = null;
  }
});

document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    selType = selType === type ? null : type;
    selTower = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('active'));
    if (selType) btn.classList.add('active');
  });
});

document.getElementById('wave-btn').addEventListener('click', startWave);
document.getElementById('sell-btn').addEventListener('click', () => sellTower(selTower));
document.getElementById('spd-btn').addEventListener('click', () => {
  speed = speed === 1 ? 2 : 1;
  document.getElementById('spd-btn').textContent = speed === 2 ? '⏩ 2×' : '⏩ 1×';
});

document.addEventListener('keydown', e => {
  if (e.code === 'Digit1') clickTowerBtn('cannon');
  else if (e.code === 'Digit2') clickTowerBtn('laser');
  else if (e.code === 'Digit3') clickTowerBtn('freeze');
  else if (e.code === 'Digit4') clickTowerBtn('missile');
  else if (e.code === 'Escape') { selType = null; selTower = null; document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('active')); }
  else if (e.code === 'KeyS') sellTower(selTower);
  else if (e.code === 'Space') { e.preventDefault(); startWave(); }
});

function clickTowerBtn(type) {
  document.querySelector(`[data-type="${type}"]`).click();
}

// ═══════════════════════════════════════════════
//  DRAW TOWER ICONS FOR BUTTONS
// ═══════════════════════════════════════════════
function drawIcons() {
  Object.entries(TOWERS).forEach(([type, cfg]) => {
    const el = document.getElementById(`icon-${type}`);
    if (!el) return;
    el.width = 30; el.height = 30;
    const c = el.getContext('2d');
    c.translate(15,15);
    c.shadowColor = cfg.color; c.shadowBlur = 8;
    // Base
    c.beginPath(); c.arc(0,0,11,0,Math.PI*2);
    c.fillStyle = '#080f1c'; c.fill();
    c.strokeStyle = cfg.color; c.lineWidth = 1.5; c.stroke();
    c.fillStyle = cfg.color;
    if (type==='cannon') {
      c.fillRect(2,-2.5,12,5);
      c.beginPath(); c.arc(0,0,5,0,Math.PI*2); c.fill();
    } else if (type==='laser') {
      c.fillRect(2,-1.5,13,3);
      c.beginPath(); c.arc(0,0,4.5,0,Math.PI*2); c.fill();
    } else if (type==='freeze') {
      for (let i=0;i<6;i++) {
        c.save(); c.rotate(i*Math.PI/3); c.fillRect(-1,-11,2,11); c.restore();
      }
      c.beginPath(); c.arc(0,0,3,0,Math.PI*2); c.fill();
    } else if (type==='missile') {
      c.fillRect(2,-2.5,10,5);
      c.beginPath(); c.moveTo(12,0); c.lineTo(16,-4); c.lineTo(16,4); c.closePath(); c.fill();
      c.beginPath(); c.arc(0,0,5,0,Math.PI*2); c.fill();
    }
  });
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
drawIcons();
initGame();
requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
</script>
