<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-left"></div>
    <div class="bg-orb orb-right"></div>

    <main class="dashboard">
      <header class="hero">
        <div>
          <p class="eyebrow">Realtime Insights</p>
          <h1>Performance Dashboard</h1>
          <p class="subtext">Track growth trends with Chart.js and explore a 3D KPI scene with Three.js.</p>
        </div>
        <button id="refreshBtn" type="button">Refresh Data</button>
      </header>

      <section class="kpi-grid">
        <article class="kpi-card">
          <h2>Revenue</h2>
          <p id="revenueValue">$0</p>
        </article>
        <article class="kpi-card">
          <h2>Users</h2>
          <p id="usersValue">0</p>
        </article>
        <article class="kpi-card">
          <h2>Conversion</h2>
          <p id="conversionValue">0%</p>
        </article>
      </section>

      <section class="visual-grid">
        <article class="panel chart-panel">
          <h3>Monthly Revenue Trend</h3>
          <canvas id="salesChart" aria-label="Monthly revenue chart" role="img"></canvas>
        </article>
        <article class="panel three-panel">
          <h3>3D Activity View</h3>
          <div id="threeRoot" class="three-root" aria-label="3D chart visualization"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
