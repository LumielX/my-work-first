<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Game Prototype</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        canvas { border: 1px solid #000; background: #f0f0f0; }
        #ui { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Marathon Game Prototype</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="ui">
        <p>สนาม: <span id="trackName">รอเริ่ม</span></p>
        <p>คลิกต่อนาที: <span id="cpm">0</span></p>
        <p>ความเร็ว: <span id="speed">0</span></p>
        <p>เวลา: <span id="time">0</span></p>
        <p>สถานะ: <span id="status">กด Spacebar เพื่อเริ่ม</p>
    </div>
    <script>
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        ctx.font = '16px Arial';
        let player = { x: 50, y: 0, speed: 0, distance: 0 };
        const laneYs = [110, 175, 240, 305];
        let opponents = [];
        const opponentConfigs = [
            { speed: 1.2, level: 'ง่าย' },
            { speed: 1.7, level: 'ปานกลาง' },
            { speed: 2.2, level: 'ยาก' }
        ];
        let trackTheme = { name: 'รอเริ่ม', bg: '#f0f0f0', lane: '#cccccc', crowd: '#6a4f4b' };
        const trackThemes = [
            { name: 'สนามสตรีทอาร์ต', bg: '#fde4b6', lane: '#ff7f50', crowd: '#2f4f4f' },
            { name: 'สนามเมือง', bg: '#d0f0fd', lane: '#8dc63f', crowd: '#533d3d' },
            { name: 'สนามสปอร์ต', bg: '#f1f1f1', lane: '#d32f2f', crowd: '#334d5c' }
        ];
        const playerLane = 1;
        const opponentLaneIndexes = [0, 2, 3];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function randomizeOpponents() {
            const configs = [...opponentConfigs];
            shuffle(configs);
            opponents = configs.map((cfg, index) => ({
                x: 50,
                y: laneYs[opponentLaneIndexes[index]],
                speed: cfg.speed,
                level: cfg.level,
                distance: 0,
                phase: 0
            }));
        }

        function randomizeTrack() {
            trackTheme = trackThemes[Math.floor(Math.random() * trackThemes.length)];
            document.getElementById('trackName').textContent = trackTheme.name;
        }

        let clicks = 0;
        let startTime;
        let gameRunning = false;
        let cpm = 0;
        let timeLimit = 15;
        let elapsed = 0;
        let spacePressed = false;
        let lastFrameTime = Date.now();

        function startGame() {
            gameRunning = true;
            startTime = Date.now();
            lastFrameTime = startTime;
            player.x = 50;
            player.y = laneYs[playerLane];
            player.speed = 0;
            player.distance = 0;
            randomizeTrack();
            randomizeOpponents();
            clicks = 0;
            cpm = 0;
            elapsed = 0;
            spacePressed = false;
            updateUI();
        }

        function updateUI() {
            document.getElementById('cpm').textContent = cpm;
            document.getElementById('speed').textContent = player.speed.toFixed(2);
            document.getElementById('time').textContent = gameRunning ? elapsed.toFixed(1) : '0.0';
            document.getElementById('status').textContent = gameRunning ? 'วิ่งอยู่' : 'กด Spacebar เพื่อเริ่มใหม่';
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let cameraX = Math.max(0, player.x - 200);

            ctx.fillStyle = trackTheme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // track background
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(0, 90, canvas.width, 260);
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = trackTheme.lane;
                ctx.fillRect(0, laneYs[i] + 16, canvas.width, 6);
            }

            // crowd graphic
            for (let x = 0; x < canvas.width; x += 30) {
                ctx.fillStyle = trackTheme.crowd;
                ctx.fillRect(x, 10, 20, 20);
                ctx.fillRect(x + 10, 40, 10, 10);
            }
            ctx.fillStyle = '#000';
            ctx.fillText('กองเชียร์', 20, 70);

            ctx.fillStyle = 'black';
            ctx.fillText('ระยะทาง: ' + Math.max(0, player.distance.toFixed(0)) + ' px', 20, 20);

            ctx.save();
            ctx.translate(-cameraX, 0);

            let playerBob = Math.sin(elapsed * 12) * 4;
            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x, player.y + playerBob, 20, 20);

            opponents.forEach((o, i) => {
                let bob = Math.sin((elapsed + i) * 10) * 3;
                ctx.fillStyle = ['green', 'yellow', 'red'][i];
                ctx.fillRect(o.x, o.y + bob, 20, 20);
                if (gameRunning) {
                    o.x += o.speed;
                    o.distance = o.x - 50;
                }
            });

            ctx.restore();

            if (gameRunning) {
                let now = Date.now();
                let dt = (now - lastFrameTime) / 1000;
                lastFrameTime = now;
                elapsed = (now - startTime) / 1000;
                player.x += player.speed;
                player.distance = player.x - 50;
                if (player.speed > 0) {
                    player.speed = Math.max(0, player.speed - 0.35 * dt);
                }
                // ยิ่งเวลาเพิ่ม ความเร็วเพิ่มขึ้นเล็กน้อย
                player.speed += 0.01 * elapsed * dt;
                player.speed = Math.min(player.speed, 8);
                cpm = elapsed > 0 ? Math.round(clicks / (elapsed / 60)) : 0;

                if (elapsed >= timeLimit) {
                    gameRunning = false;
                    let bestDistance = Math.max(player.distance, opponents[0].distance, opponents[1].distance, opponents[2].distance);
                    let result = player.distance >= bestDistance ? 'ชนะ' : 'แพ้';
                    document.getElementById('status').textContent = result + '! ระยะทางของคุณ ' + Math.max(0, player.distance.toFixed(0)) + ' px';
                }
                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (spacePressed) return;
                spacePressed = true;
                if (!gameRunning) {
                    startGame();
                } else {
                    clicks++;
                    player.speed += 0.12;
                    player.speed = Math.min(player.speed, 8);
                    setTimeout(() => {
                        player.speed = Math.max(0, player.speed - 0.02);
                    }, 100);
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
            }
        });

        gameLoop();
    </script>
    <!-- หลักฐาน: สร้างต้นแบบเกมวิ่งแข่ง กด spacebar วัดคลิกต่อนาที ความเร็ว คู่แข่งหลายระดับ จับเวลา ตาม requirement ที่ให้มา -->
</body>
</html>
